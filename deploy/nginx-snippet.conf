# Вставить этот блок ВНУТРЬ существующего server { ... } в
# /etc/nginx/sites-available/novamanya.conf ДО блока `location / { ... }`
# (порядок важен: более специфичные пути должны идти раньше `/`)

location /waybills/ {
    rewrite ^/waybills/(.*)$ /$1 break;
    rewrite ^/waybills$ / break;
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /waybills;
    proxy_read_timeout 600s;
    client_max_body_size 100M;
}
